<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pay — Thanos_Linkz</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234338f7'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='white' font-family='sans-serif'>T</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #4338f7; --brand-dark: #2d24c9; --brand-rgb: 67,56,247;
      --brand-light: #ede9ff; --text: #1a1a2e; --muted: #8b8fa8;
      --border: #e8e4ff; --surface: #f5f4ff;
    }
    body {
      min-height: 100vh; font-family: 'DM Sans', sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #2a1780 0%, #0d0d2b 55%, #080818 100%);
      display: flex; align-items: center; justify-content: center; padding: 28px 16px;
    }
    body::before {
      content: ''; position: fixed; width: 500px; height: 500px;
      background: rgba(var(--brand-rgb), 0.15); border-radius: 50%; filter: blur(90px);
      top: -150px; left: -150px; pointer-events: none;
      animation: orb 9s ease-in-out infinite alternate;
    }
    @keyframes orb { to { transform: translate(80px, 100px); } }
    .card {
      position: relative; background: #fff; border-radius: 28px;
      padding: 30px 24px 28px; width: 100%; max-width: 390px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
      animation: cardIn 0.55s cubic-bezier(0.34,1.5,0.64,1) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
    .profile { display: flex; flex-direction: column; align-items: center; margin-bottom: 22px; }
    .avatar-wrap { position: relative; width: 76px; height: 76px; margin-bottom: 12px; }
    .avatar { width: 76px; height: 76px; border-radius: 50%; background: var(--brand-light); border: 3px solid var(--brand-light); box-shadow: 0 4px 16px rgba(var(--brand-rgb),0.2); display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 700; color: var(--brand); cursor: pointer; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar-edit { position: absolute; bottom: 0; right: 0; width: 24px; height: 24px; background: var(--brand); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; }
    #photoInput { display: none; }
    .name { font-family: 'Sora', sans-serif; font-size: 23px; font-weight: 800; color: var(--brand); letter-spacing: -0.4px; margin-bottom: 5px; }
    .protected { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    .badge-static { display: inline-flex; align-items: center; gap: 5px; background: var(--brand-light); color: var(--brand); font-size: 11px; font-weight: 700; font-family: 'Sora', sans-serif; padding: 4px 12px; border-radius: 20px; margin-top: 8px; border: 1px solid var(--border); }
    .qr-wrapper { display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
    .qr-box { position: relative; background: #fff; border-radius: 18px; padding: 10px; border: 2px solid var(--border); box-shadow: 0 4px 24px rgba(var(--brand-rgb),0.10); }
    #qrCanvas { display: block; border-radius: 8px; }
    .qr-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.85); border-radius: 16px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .qr-loading.show { opacity: 1; pointer-events: all; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .qr-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 44px; height: 44px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.12); border: 2px solid #f0eeff; }
    .upi-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 12px; padding: 11px 13px; margin-bottom: 14px; border: 1px solid var(--border); }
    .upi-label { font-size: 12.5px; font-weight: 600; color: var(--text); white-space: nowrap; }
    .upi-id-text { flex: 1; font-size: 13px; font-weight: 600; color: var(--brand); word-break: break-all; }
    .copy-btn { background: var(--brand); border: none; border-radius: 9px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s, transform 0.12s; }
    .copy-btn:hover { background: var(--brand-dark); transform: scale(1.07); }
    .btn-primary { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px; background: linear-gradient(135deg, var(--brand) 0%, #6366f1 100%); color: white; font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; margin-bottom: 9px; box-shadow: 0 6px 20px rgba(var(--brand-rgb),0.35); transition: transform 0.15s, box-shadow 0.15s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(var(--brand-rgb),0.45); }
    .btn-outline { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 13px; background: transparent; color: var(--brand); font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; border: 1.5px solid var(--brand); border-radius: 14px; cursor: pointer; transition: background 0.15s, transform 0.12s; }
    .btn-outline:hover { background: var(--brand-light); transform: translateY(-1px); }
    .btn-intl { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 9px; padding: 13px; background: transparent; color: #64748b; font-family: 'Sora', sans-serif; font-size: 13.5px; font-weight: 600; border: 1.5px dashed #cbd5e1; border-radius: 14px; cursor: pointer; transition: all 0.18s; }
    .btn-intl:hover { border-color: #94a3b8; color: #475569; background: #f8fafc; transform: translateY(-1px); }
    .btn-telegram-contact { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 9px; padding: 13px; background: linear-gradient(135deg, #0088cc, #229ED9); color: white; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,136,204,0.30); transition: transform 0.15s, box-shadow 0.15s; }
    .btn-telegram-contact:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,136,204,0.40); }
    .payment-note { display: flex; align-items: flex-start; gap: 9px; background: #fffbeb; border: 1.5px solid #fcd34d; border-radius: 12px; padding: 11px 13px; margin-top: 9px; }
    .payment-note svg { flex-shrink: 0; margin-top: 1px; }
    .payment-note-text { font-size: 12.5px; font-family: 'DM Sans', sans-serif; color: #92400e; line-height: 1.5; }
    .payment-note-text b { font-weight: 700; color: #78350f; }
    .intl-overlay { position: fixed; inset: 0; background: rgba(10,10,30,0.72); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.25s; padding: 24px; }
    .intl-overlay.show { opacity: 1; pointer-events: all; }
    .intl-modal { background: white; border-radius: 24px; padding: 32px 26px; width: 100%; max-width: 360px; transform: scale(0.92); transition: transform 0.3s cubic-bezier(0.34,1.5,0.64,1); box-shadow: 0 32px 80px rgba(0,0,0,0.4); text-align: center; }
    .intl-overlay.show .intl-modal { transform: scale(1); }
    .intl-icon { width: 68px; height: 68px; background: linear-gradient(135deg, #0088cc, #229ED9); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 8px 24px rgba(0,136,204,0.35); }
    .intl-badge { display: inline-flex; align-items: center; gap: 5px; background: #fff3cd; color: #856404; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; margin-bottom: 14px; border: 1px solid #ffd970; }
    .intl-title { font-family: 'Sora', sans-serif; font-size: 19px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
    .intl-desc { font-size: 13.5px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
    .intl-desc strong { color: var(--text); }
    .intl-steps { background: var(--surface); border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; border: 1px solid var(--border); text-align: left; }
    .intl-step { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; }
    .intl-step:not(:last-child) { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 4px; }
    .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--brand); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Sora', sans-serif; }
    .step-text { font-size: 12.5px; line-height: 1.5; color: #555; }
    .step-text strong { color: var(--text); }
    .btn-telegram { display: flex; align-items: center; justify-content: center; gap: 9px; width: 100%; padding: 14px; background: linear-gradient(135deg, #0088cc, #229ED9); color: white; font-family: 'Sora', sans-serif; font-size: 14.5px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 6px 20px rgba(0,136,204,0.35); transition: transform 0.15s, box-shadow 0.15s; }
    .btn-telegram:hover { transform: translateY(-2px); }
    .intl-close { display: block; width: 100%; padding: 12px; background: transparent; color: var(--muted); font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); border-radius: 14px; cursor: pointer; }
    .sheet-overlay { position: fixed; inset: 0; background: rgba(10,10,30,0.72); backdrop-filter: blur(8px); display: flex; align-items: flex-end; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .sheet-overlay.show { opacity: 1; pointer-events: all; }
    .app-sheet { background: white; border-radius: 28px 28px 0 0; padding: 10px 22px 36px; width: 100%; max-width: 480px; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34,1.3,0.64,1); }
    .sheet-overlay.show .app-sheet { transform: translateY(0); }
    .sheet-handle { width: 40px; height: 4px; background: #e2e0f0; border-radius: 4px; margin: 12px auto 20px; }
    .sheet-title { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 4px; }
    .sheet-sub { font-size: 12.5px; color: var(--muted); text-align: center; margin-bottom: 20px; }
    .app-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
    .app-btn { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 13px 6px; border-radius: 16px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.18s; }
    .app-btn:hover { border-color: var(--brand); background: var(--brand-light); transform: translateY(-3px); }
    .app-btn:active { transform: scale(0.96); }
    .app-icon-div { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .app-btn span { font-size: 11px; font-weight: 600; font-family: 'Sora', sans-serif; color: var(--text); text-align: center; }
    .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 12px; color: var(--muted); font-weight: 500; white-space: nowrap; }
    .fallback-box { background: var(--surface); border-radius: 14px; padding: 13px 14px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .fallback-upi { flex: 1; font-size: 13px; font-weight: 600; color: var(--brand); word-break: break-all; }
    .fallback-copy { background: var(--brand); border: none; border-radius: 9px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .close-sheet { display: block; width: 100%; padding: 13px; background: transparent; color: var(--muted); font-family: 'Sora', sans-serif; font-size: 13.5px; font-weight: 600; border: 1.5px solid var(--border); border-radius: 14px; cursor: pointer; }
    .skeleton-overlay { position: fixed; inset: 0; z-index: 9000; background: radial-gradient(ellipse at 30% 20%, #2a1780 0%, #0d0d2b 55%, #080818 100%); display: flex; align-items: center; justify-content: center; padding: 28px 16px; transition: opacity 0.5s ease; }
    .skeleton-overlay.fade-out { opacity: 0; pointer-events: none; }
    .skeleton-card { background: white; border-radius: 28px; padding: 30px 24px 28px; width: 100%; max-width: 390px; box-shadow: 0 32px 80px rgba(0,0,0,0.45); }
    .skel { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 10px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-avatar { width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 12px; }
    .skel-name { height: 26px; width: 60%; margin: 0 auto 8px; }
    .skel-badge { height: 16px; width: 40%; margin: 0 auto 22px; }
    .skel-qr { width: 220px; height: 220px; border-radius: 18px; margin: 0 auto 18px; }
    .skel-upi { height: 46px; margin-bottom: 14px; }
    .skel-btn { height: 50px; margin-bottom: 9px; }
    .skel-btn2 { height: 44px; }
    #confetti-canvas { position: fixed; inset: 0; z-index: 8000; pointer-events: none; width: 100%; height: 100%; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: #1a1a2e; color: white; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.28s ease; z-index: 9999; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 7px; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

<div class="card">

<div class="sheet-overlay" id="appSheet" onclick="handleOverlayClick(event)">
