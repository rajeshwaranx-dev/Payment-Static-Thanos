<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay — Ask Movies</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234338f7'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='white' font-family='sans-serif'>A</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #4338f7; --brand-dark: #2d24c9; --brand-rgb: 67,56,247;
      --brand-light: #ede9ff; --text: #1a1a2e; --muted: #8b8fa8;
      --border: #e8e4ff; --surface: #f5f4ff;
    }
    body {
      min-height: 100vh; font-family: 'DM Sans', sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #2a1780 0%, #0d0d2b 55%, #080818 100%);
      display: flex; align-items: center; justify-content: center; padding: 28px 16px;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; width: 500px; height: 500px;
      background: rgba(var(--brand-rgb), 0.15); border-radius: 50%; filter: blur(90px);
      top: -150px; left: -150px; pointer-events: none;
      animation: orb 9s ease-in-out infinite alternate;
    }
    @keyframes orb { to { transform: translate(80px, 100px); } }

    /* Card & Profile */
    .card {
      position: relative; background: #fff; border-radius: 28px;
      padding: 30px 24px 28px; width: 100%; max-width: 390px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
      animation: cardIn 0.55s cubic-bezier(0.34,1.5,0.64,1) both;
      z-index: 10;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }

    .profile { display: flex; flex-direction: column; align-items: center; margin-bottom: 22px; }
    .avatar-wrap { position: relative; width: 76px; height: 76px; margin-bottom: 12px; }
    .avatar { width: 76px; height: 76px; border-radius: 50%; background: var(--brand-light); border: 3px solid var(--brand-light); box-shadow: 0 4px 16px rgba(var(--brand-rgb),0.2); display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 700; color: var(--brand); overflow: hidden; }
    .name { font-family: 'Sora', sans-serif; font-size: 23px; font-weight: 800; color: var(--brand); letter-spacing: -0.4px; margin-bottom: 5px; }
    .protected { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }

    /* QR Section */
    .qr-wrapper { display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
    .qr-box { position: relative; background: #fff; border-radius: 18px; padding: 10px; border: 2px solid var(--border); box-shadow: 0 4px 24px rgba(var(--brand-rgb),0.10); }
    #qrImage { display: block; width: 200px; height: 200px; border-radius: 8px; }
    .qr-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 44px; height: 44px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.12); border: 2px solid #f0eeff; }

    /* UPI Row */
    .upi-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 12px; padding: 11px 13px; margin-bottom: 14px; border: 1px solid var(--border); }
    .upi-label { font-size: 12.5px; font-weight: 600; color: var(--text); }
    .upi-id-text { flex: 1; font-size: 13px; font-weight: 600; color: var(--brand); }
    .copy-btn { background: var(--brand); border: none; border-radius: 9px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s; }
    .copy-btn:hover { background: var(--brand-dark); }

    /* Buttons */
    .btn-primary, .btn-telegram-contact, .btn-telegram { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px; background: linear-gradient(135deg, var(--brand) 0%, #6366f1 100%); color: white; font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; margin-bottom: 9px; box-shadow: 0 6px 20px rgba(var(--brand-rgb),0.35); transition: transform 0.15s; }
    .btn-telegram-contact, .btn-telegram { background: linear-gradient(135deg, #0088cc, #229ED9); }
    .btn-primary:hover, .btn-telegram-contact:hover { transform: translateY(-2px); }
    
    .btn-outline, .btn-intl, .intl-close, .close-sheet { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 13px; background: transparent; color: var(--brand); font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; border: 1.5px solid var(--brand); border-radius: 14px; cursor: pointer; margin-bottom: 9px; }
    .btn-intl { color: #64748b; border: 1.5px dashed #cbd5e1; font-size: 13.5px; }

    .payment-note { display: flex; align-items: flex-start; gap: 9px; background: #fffbeb; border: 1.5px solid #fcd34d; border-radius: 12px; padding: 11px 13px; margin-top: 9px; }
    .payment-note-text { font-size: 12.5px; color: #92400e; line-height: 1.5; }

    /* Modals & Sheets */
    .overlay { position: fixed; inset: 0; background: rgba(10,10,30,0.72); backdrop-filter: blur(8px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.25s; display: flex; justify-content: center; }
    .overlay.show { opacity: 1; pointer-events: all; }
    
    /* Intl Modal Specific */
    .intl-overlay { align-items: center; padding: 24px; }
    .intl-modal { background: white; border-radius: 24px; padding: 32px 26px; width: 100%; max-width: 360px; text-align: center; transform: scale(0.9); transition: 0.3s; }
    .overlay.show .intl-modal { transform: scale(1); }

    /* App Sheet Specific */
    .sheet-overlay { align-items: flex-end; }
    .app-sheet { background: white; border-radius: 28px 28px 0 0; padding: 10px 22px 36px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.35s; }
    .overlay.show .app-sheet { transform: translateY(0); }
    .sheet-handle { width: 40px; height: 4px; background: #e2e0f0; border-radius: 4px; margin: 12px auto 20px; }

    .app-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
    .app-btn { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 13px 6px; border-radius: 16px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; font-size: 11px; font-weight: 600; }

    /* Skeleton Loader */
    .skeleton-overlay { position: fixed; inset: 0; background: #0d0d2b; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    .skeleton-card { background: white; border-radius: 28px; padding: 30px 24px; width: 390px; }
    .skel { background: #eee; height: 20px; margin-bottom: 15px; border-radius: 10px; }
    .skel-avatar { width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 20px; }
    .skel-qr { height: 200px; margin-bottom: 20px; }

    /* Toast */
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 10000; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- SKELETON LOADER -->
<div class="skeleton-overlay" id="skeleton">
  <div class="skeleton-card">
    <div class="skel skel-avatar"></div>
    <div class="skel" style="width:60%; margin: 0 auto 20px;"></div>
    <div class="skel skel-qr"></div>
    <div class="skel"></div>
    <div class="skel"></div>
  </div>
</div>

<div class="card">
  <div class="profile">
    <div class="avatar-wrap">
      <div class="avatar">R</div>
    </div>
    <div class="name">Ask Movies</div>
    <div class="protected">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Protected Payment Page
    </div>
  </div>

  <div class="qr-wrapper">
    <div class="qr-box">
      <!-- Fixed QR Code for Rajeshtg18x@ibl -->
      <img id="qrImage" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=Rajeshtg18x@ibl%26pn=Ask%20Movies%26cu=INR" alt="UPI QR Code">
      <div class="qr-logo">
        <svg viewBox="0 0 60 40" width="32" height="22"><polygon points="20,2 4,36 14,36 30,2" fill="#f26522"/><polygon points="40,2 24,36 34,36 50,2" fill="#00b050"/></svg>
      </div>
    </div>
  </div>

  <div class="upi-row">
    <span class="upi-label">UPI:</span>
    <span class="upi-id-text" id="upiId">Rajeshtg18x@ibl</span>
    <button class="copy-btn" onclick="copyUPI()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </button>
  </div>

  <button class="btn-primary" onclick="toggleSheet(true)">Pay with App</button>
  <button class="btn-outline" onclick="downloadQR()">Download QR</button>
  <button class="btn-intl" onclick="toggleIntl(true)">International Payment</button>
  <button class="btn-telegram-contact" onclick="window.open('https://t.me/your_admin_username')">Contact on Telegram</button>

  <div class="payment-note">
    <div class="payment-note-text">
      <b>Important:</b> After payment, please send the <b>screenshot</b> to admin on Telegram for confirmation.
    </div>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div class="overlay sheet-overlay" id="appSheet" onclick="toggleSheet(false)">
  <div class="app-sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title" style="text-align:center; font-weight:bold; margin-bottom:20px;">Choose Payment App</div>
    <div class="app-grid">
      <div class="app-btn" onclick="openUPI('gpay')"><span>GPay</span></div>
      <div class="app-btn" onclick="openUPI('phonepe')"><span>PhonePe</span></div>
      <div class="app-btn" onclick="openUPI('paytm')"><span>Paytm</span></div>
      <div class="app-btn" onclick="openUPI('bhim')"><span>BHIM</span></div>
    </div>
    <button class="close-sheet" onclick="toggleSheet(false)">Cancel</button>
  </div>
</div>

<!-- INTL MODAL -->
<div class="overlay intl-overlay" id="intlModal" onclick="toggleIntl(false)">
  <div class="intl-modal" onclick="event.stopPropagation()">
    <div class="intl-title">Outside India?</div>
    <p style="font-size:13px; color:#666; margin:15px 0;">Please contact admin to arrange a secure international payment link.</p>
    <button class="btn-telegram" onclick="window.open('https://t.me/your_admin_username')">Contact on Telegram</button>
    <button class="intl-close" onclick="toggleIntl(false)">Maybe Later</button>
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
  // Hide skeleton after 1.5s
  window.onload = () => {
    setTimeout(() => {
      document.getElementById('skeleton').style.opacity = '0';
      setTimeout(() => document.getElementById('skeleton').style.display = 'none', 500);
    }, 1200);
  };

  function copyUPI() {
    const upi = document.getElementById('upiId').innerText;
    navigator.clipboard.writeText(upi);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function toggleSheet(show) {
    document.getElementById('appSheet').classList.toggle('show', show);
  }

  function toggleIntl(show) {
    document.getElementById('intlModal').classList.toggle('show', show);
  }

  function openUPI(app) {
    const upiUrl = "upi://pay?pa=Rajeshtg18x@ibl&pn=Ask Movies&cu=INR";
    window.location.href = upiUrl;
  }

  function downloadQR() {
    const link = document.createElement('a');
    link.href = document.getElementById('qrImage').src;
    link.download = 'AskMovies_QR.png';
    link.click();
  }
</script>

</body>
</html>
